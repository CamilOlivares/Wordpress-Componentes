<div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 30px; padding: 20px; font-family: 'Segoe UI', Arial, sans-serif; max-width: 1200px; margin: 0 auto;">
    
    <!-- Card 1 - Azul  con icono de señora de Aseo -->
    <div style="width: 280px; border-radius: 16px; overflow: hidden; background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%); box-shadow: 0 6px 15px rgba(0,0,0,0.08); transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); border: 1px solid rgba(255,255,255,0.4);">
        <a href="https://tudominio.com/consulta" target="_blank" 
           style="text-decoration: none; color: inherit; display: block; height: 100%; width: 100%;">
            <div style="padding: 25px; text-align: center; background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%); transition: all 0.4s ease;">
              <!-- icono interactivo obtenido de "lordicon.com" el cual puedes cambiar o modificar obtenendo el codigo desde su sitio web-->
                <script src="https://cdn.lordicon.com/lordicon.js"></script>
                <lord-icon
                    src="https://cdn.lordicon.com/sviehykt.json"
                    trigger="hover"
                    colors="primary:#ffffff,secondary:#ffffff"
                    style="width:80px;height:80px">
                </lord-icon>
            </div>
            <div style="padding: 25px; text-align: center; min-height: 180px;">
                <h3 style="color: #2b2d42; margin-top: 0; margin-bottom: 15px; font-size: 1.4em; font-weight: 700;">Insumos de Aseo</h3>
                <p style="color: #4a5568; line-height: 1.6; margin-bottom: 20px; font-size: 0.95em;">
                    Productos de limpieza y desinfección para mantener espacios impecables, seguros y libres de contaminantes.
                </p>
            </div>
        </a>
    </div>

</div>

<script>
document.querySelectorAll('[style*="width: 280px;"]').forEach(card => {
    card.addEventListener('mouseover', function() {
        this.style.transform = 'translateY(-10px) scale(1.03)';
        this.style.boxShadow = '0 12px 28px rgba(0,0,0,0.15)';
    });
    card.addEventListener('mouseout', function() {
        this.style.transform = 'none';
        this.style.boxShadow = '0 6px 15px rgba(0,0,0,0.08)';
    });
});
</script>
