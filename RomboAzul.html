<!-- CSS incrustado -->
<style>
/* Rombo 3D con degradado azul */
.diamond-card {
  width: 100px; /* Cambiar este valor para hacerlo más grande o pequeño */
  height: 100px;
  background: linear-gradient(135deg, #6a11cb, #2575fc, #0b1f8c);
  box-shadow: 
    0 10px 25px rgba(0, 0, 0, 0.5),
    inset 0 5px 15px rgba(255, 255, 255, 0.15),
    inset 0 -5px 15px rgba(0, 0, 0, 0.3);
  transition: all 0.4s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  
  /* Giro para convertir en rombo */
  transform: rotate(45deg);
}

/* Volvemos a rotar el contenido interno para que quede derecho */
.diamond-card a {
  transform: rotate(-45deg);
}

/* Efecto hover */
.diamond-card:hover {
  transform: rotate(45deg) translateY(-12px) scale(1.07);
  box-shadow: 
    0 18px 40px rgba(0, 0, 0, 0.6),
    inset 0 8px 20px rgba(255, 255, 255, 0.2),
